<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accelerometer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .value {
      font-size: 20px;
      margin: 8px 0;
      font-weight: bold;
    }

    button {
      margin-top: 12px;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn-start {
      background: #1f36a6;
      color: white;
    }

    .btn-stop {
      background: #ef4444;
      color: white;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

  <h1>Accelerometer</h1>

  <div class="card">
    <div class="value">X: <span id="x">0</span></div>
    <div class="value">Y: <span id="y">0</span></div>
    <div class="value">Z: <span id="z">0</span></div>

    <button class="btn-start" onclick="startAccel()">Start</button>
    <button class="btn-stop" onclick="stopAccel()">Stop</button>

    <div class="status" id="status">Belum aktif</div>
  </div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzwEOB4ji8PBSv7tIX4xz1Dhbn6xK93P-fY2Hw6QusCcN3QgA51HOuRx9umvuXQFl42/exec";

let running = false;
let lastSent = 0;

// ambil device_id dari localStorage
function getDeviceId() {
  return localStorage.getItem("presence_device_id") || "";
}

function updateUI(x, y, z) {
  document.getElementById("x").innerText = x.toFixed(3);
  document.getElementById("y").innerText = y.toFixed(3);
  document.getElementById("z").innerText = z.toFixed(3);
}

function setStatus(text) {
  document.getElementById("status").innerText = text;
}

// JSONP helper
function sendData(params) {
  const url = GAS_URL + "?" + new URLSearchParams(params).toString();

  const script = document.createElement("script");
  script.src = url;
  document.body.appendChild(script);

  setTimeout(() => {
    script.remove();
  }, 2000);
}

// START
async function startAccel() {
  const deviceId = getDeviceId();

  if (!deviceId) {
    alert("Device ID tidak ditemukan. Kembali ke registrasi.");
    return;
  }

  // iOS permission
  if (typeof DeviceMotionEvent.requestPermission === "function") {
    try {
      const res = await DeviceMotionEvent.requestPermission();
      if (res !== "granted") {
        alert("Permission ditolak");
        return;
      }
    } catch (err) {
      alert("Gagal request permission");
      return;
    }
  }

  running = true;
  setStatus("Aktif...");

  window.addEventListener("devicemotion", handleMotion);
}

// STOP
function stopAccel() {
  running = false;
  setStatus("Berhenti");
  window.removeEventListener("devicemotion", handleMotion);
}

// HANDLE DATA
function handleMotion(event) {
  if (!running) return;

  const acc = event.accelerationIncludingGravity;
  if (!acc) return;

  const x = acc.x || 0;
  const y = acc.y || 0;
  const z = acc.z || 0;

  updateUI(x, y, z);

  const now = Date.now();

  // kirim tiap 1 detik
  if (now - lastSent > 1000) {
    lastSent = now;

    sendData({
      action: "accel",
      device_id: getDeviceId(),
      ts: now,
      x: x,
      y: y,
      z: z
    });
  }
}
</script>

</body>
</html>
