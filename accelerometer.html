<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accelerometer</title>

  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --primary: #1f36a6;
      --danger: #ef4444;
      --border: #e5e7eb;
      --shadow: 0 10px 28px rgba(0,0,0,0.10);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 22px 16px 40px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      margin: 10px 0 22px;
      text-align: center;
      font-size: 34px;
      font-weight: 800;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 18px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric-box {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 10px;
      text-align: center;
    }

    .metric-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
    }

    .metric-dir {
      font-size: 13px;
      color: var(--primary);
      font-weight: 700;
      min-height: 18px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      height: 48px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-start {
      background: #1f36a6;
      color: white;
    }

    .btn-stop {
      background: #ef4444;
      color: white;
    }

    .status {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .chart-wrap {
      position: relative;
      height: 320px;
    }

    .legend-note {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .info-box {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .info-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .info-value {
      font-size: 15px;
      font-weight: 700;
      word-break: break-word;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 28px;
      }

      .metrics-grid {
        grid-template-columns: 1fr;
      }

      .actions,
      .info-grid {
        grid-template-columns: 1fr;
      }

      .chart-wrap {
        height: 280px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Accelerometer</h1>

    <div class="card">
      <h2 class="section-title">Live Sensor</h2>

      <div class="metrics-grid">
        <div class="metric-box">
          <div class="metric-label">X</div>
          <div class="metric-value" id="x">0.000</div>
          <div class="metric-dir" id="dirX">diam</div>
        </div>

        <div class="metric-box">
          <div class="metric-label">Y</div>
          <div class="metric-value" id="y">0.000</div>
          <div class="metric-dir" id="dirY">diam</div>
        </div>

        <div class="metric-box">
          <div class="metric-label">Z</div>
          <div class="metric-value" id="z">0.000</div>
          <div class="metric-dir" id="dirZ">diam</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-start" onclick="startAccel()">Start</button>
        <button class="btn btn-stop" onclick="stopAccel()">Stop</button>
      </div>

      <div class="status" id="status">Belum aktif</div>

      <div class="info-grid">
        <div class="info-box">
          <div class="info-label">Device ID</div>
          <div class="info-value" id="deviceIdText">-</div>
        </div>
        <div class="info-box">
          <div class="info-label">Kirim ke Sheet</div>
          <div class="info-value" id="sendInfo">Menunggu start</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">Grafik Realtime X / Y / Z</h2>

      <div class="chart-wrap">
        <canvas id="accelChart"></canvas>
      </div>

      <div class="legend-note">
        Arah pembacaan:
        <br>X → depan / belakang
        <br>Y → kanan / kiri
        <br>Z → atas / bawah
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzXQyqvnr1igO1MDW3E1_9t4w_HMb0BSJ54I-ukFHo1QNo8XCl63NncIQ3OLrD7aLdA/exec";

  let running = false;
  let lastSent = 0;
  let chart = null;
  let pollTimer = null;

  const THRESHOLD = 0.8;

  function getDeviceId() {
    return localStorage.getItem("presence_device_id") || "";
  }

  function setStatus(text) {
    document.getElementById("status").innerText = text;
  }

  function setSendInfo(text) {
    document.getElementById("sendInfo").innerText = text;
  }

  function updateUI(x, y, z) {
    document.getElementById("x").innerText = Number(x).toFixed(3);
    document.getElementById("y").innerText = Number(y).toFixed(3);
    document.getElementById("z").innerText = Number(z).toFixed(3);

    document.getElementById("dirX").innerText = getDirectionX(Number(x));
    document.getElementById("dirY").innerText = getDirectionY(Number(y));
    document.getElementById("dirZ").innerText = getDirectionZ(Number(z));
  }

  function getDirectionX(x) {
    if (x > THRESHOLD) return "depan";
    if (x < -THRESHOLD) return "belakang";
    return "diam";
  }

  function getDirectionY(y) {
    if (y > THRESHOLD) return "kanan";
    if (y < -THRESHOLD) return "kiri";
    return "diam";
  }

  function getDirectionZ(z) {
    if (z > 10.2) return "atas";
    if (z < 9.0) return "bawah";
    return "diam";
  }

  function initChart() {
    const ctx = document.getElementById("accelChart").getContext("2d");

    chart = new Chart(ctx, {
      type: "line",
      data: {
        labels: [],
        datasets: [
          {
            label: "X",
            data: [],
            borderColor: "#2563eb",
            backgroundColor: "rgba(37,99,235,0.15)",
            tension: 0.25,
            pointRadius: 2,
            borderWidth: 2
          },
          {
            label: "Y",
            data: [],
            borderColor: "#16a34a",
            backgroundColor: "rgba(22,163,74,0.15)",
            tension: 0.25,
            pointRadius: 2,
            borderWidth: 2
          },
          {
            label: "Z",
            data: [],
            borderColor: "#ef4444",
            backgroundColor: "rgba(239,68,68,0.15)",
            tension: 0.25,
            pointRadius: 2,
            borderWidth: 2
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        scales: {
          y: {
            suggestedMin: -12,
            suggestedMax: 12
          }
        }
      }
    });
  }

  function jsonpRequest(url) {
    return new Promise((resolve, reject) => {
      const cbName = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
      const script = document.createElement("script");
      const sep = url.includes("?") ? "&" : "?";

      window[cbName] = function(data) {
        cleanup();
        resolve(data);
      };

      function cleanup() {
        try { delete window[cbName]; } catch (e) {}
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      script.src = url + sep + "callback=" + cbName;
      script.onerror = function() {
        cleanup();
        reject(new Error("Gagal menghubungi server"));
      };

      document.body.appendChild(script);
    });
  }

  async function sendAccelData(x, y, z) {
    const deviceId = getDeviceId();
    if (!deviceId) return;

    const url =
      GAS_URL +
      "?action=accel" +
      "&device_id=" + encodeURIComponent(deviceId) +
      "&ts=" + encodeURIComponent(new Date().toISOString()) +
      "&x=" + encodeURIComponent(Number(x).toFixed(4)) +
      "&y=" + encodeURIComponent(Number(y).toFixed(4)) +
      "&z=" + encodeURIComponent(Number(z).toFixed(4)) +
      "&_ts=" + Date.now();

    try {
      const res = await jsonpRequest(url);
      if (res && res.ok) {
        setSendInfo("Terkirim: " + new Date().toLocaleTimeString("id-ID"));
      } else {
        setSendInfo("Gagal kirim");
      }
    } catch (err) {
      setSendInfo("Gagal kirim");
    }
  }

  async function fetchLatestFromGas() {
    const deviceId = getDeviceId();
    if (!deviceId || !chart) return;

    const url =
      GAS_URL +
      "?action=accel_latest" +
      "&device_id=" + encodeURIComponent(deviceId) +
      "&limit=20" +
      "&_ts=" + Date.now();

    try {
      const res = await jsonpRequest(url);
      if (!res || !res.ok || !res.data || !Array.isArray(res.data.items)) return;

      const items = res.data.items;

      chart.data.labels = items.map(item => {
        const t = item.t || item.ts || "";
        const d = new Date(t);
        return isNaN(d.getTime())
          ? ""
          : d.toLocaleTimeString("id-ID", { minute: "2-digit", second: "2-digit" });
      });

      chart.data.datasets[0].data = items.map(item => Number(item.x || 0));
      chart.data.datasets[1].data = items.map(item => Number(item.y || 0));
      chart.data.datasets[2].data = items.map(item => Number(item.z || 0));
      chart.update("none");

      if (items.length > 0) {
        const last = items[items.length - 1];
        updateUI(last.x, last.y, last.z);
      }
    } catch (err) {
      // biarkan diam
    }
  }

  async function startAccel() {
    const deviceId = getDeviceId();

    if (!deviceId) {
      alert("Device ID tidak ditemukan. Silakan kembali ke registrasi.");
      return;
    }

    document.getElementById("deviceIdText").innerText = deviceId;

    if (typeof DeviceMotionEvent === "undefined") {
      alert("Sensor accelerometer tidak didukung browser ini.");
      return;
    }

    if (typeof DeviceMotionEvent.requestPermission === "function") {
      try {
        const permission = await DeviceMotionEvent.requestPermission();
        if (permission !== "granted") {
          alert("Izin sensor ditolak.");
          return;
        }
      } catch (err) {
        alert("Gagal meminta izin sensor.");
        return;
      }
    }

    if (running) return;

    running = true;
    setStatus("Aktif membaca sensor...");
    setSendInfo("Pengiriman aktif");

    window.addEventListener("devicemotion", handleMotion);

    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(fetchLatestFromGas, 1000);
  }

  function stopAccel() {
    running = false;
    window.removeEventListener("devicemotion", handleMotion);
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = null;
    setStatus("Berhenti");
    setSendInfo("Pengiriman dihentikan");
  }

  function handleMotion(event) {
    if (!running) return;

    const acc = event.accelerationIncludingGravity || event.acceleration;
    if (!acc) return;

    const x = acc.x || 0;
    const y = acc.y || 0;
    const z = acc.z || 0;

    const now = Date.now();
    if (now - lastSent > 1000) {
      lastSent = now;
      sendAccelData(x, y, z);
    }
  }

  initChart();
  document.getElementById("deviceIdText").innerText = getDeviceId() || "-";
  fetchLatestFromGas();
</script>
</body>
</html>
