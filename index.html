<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registrasi Presensi</title>
</head>
<body>
  <h1>Registrasi Presensi</h1>

  <label>Nama:</label><br>
  <input type="text" id="nama"><br><br>

  <label>NIM:</label><br>
  <input type="text" id="nim"><br><br>

  <button onclick="lanjutScan()">Lanjut Scan</button>
  <div id="msg" style="margin-top:12px;"></div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwm3T5ueVAIdUQ5Sn47LtqSaFFLWmx6lct0xxh4JLC1bcBzZtS_3KFN_002KumzMXmO/exec";

    function show(msg) {
      document.getElementById("msg").innerText = msg;
    }

    function lanjutScan() {
      const nama = document.getElementById("nama").value.trim();
      const nim = document.getElementById("nim").value.trim();

      if (!nama) {
        show("Nama wajib diisi");
        return;
      }

      if (!nim) {
        show("NIM wajib diisi");
        return;
      }

      // simpan lokal untuk scanner
      localStorage.setItem("presence_nama", nama);
      localStorage.setItem("presence_nim", nim);

      show("Menyimpan data pengguna...");

      const url =
        GAS_URL +
        "?action=register_beacon" +
        "&name=" + encodeURIComponent(nama) +
        "&nim=" + encodeURIComponent(nim) +
        "&_ts=" + Date.now();

      const img = new Image();

      img.onload = function () {
        show("Data tersimpan. Mengalihkan ke scanner...");
        setTimeout(() => {
          window.location.href = "./scanner.html";
        }, 500);
      };

      img.onerror = function () {
        show("Gagal menghubungi server GAS");
      };

      img.src = url;
    }
  </script>
</body>
</html>
