<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registrasi Presensi</title>
</head>
<body style="font-family:Arial;padding:16px;max-width:520px;">
  <h2>Registrasi Presensi</h2>

  <label>Nama:</label><br>
  <input id="nama" placeholder="Nama lengkap" style="width:100%;padding:10px;"><br><br>

  <label>NIM:</label><br>
  <input id="nim" placeholder="contoh: 231234567" style="width:100%;padding:10px;"><br><br>

  <button onclick="submitReg()">Lanjut Scan</button>

  <pre id="out" style="margin-top:12px;white-space:pre-wrap;"></pre>

<script>
  const GAS_REGISTER = "https://script.google.com/macros/s/AKfycbzUhgKA9sUZiI-xEGQg_0A76xF_4_NaC26okt7qoasZ88uxQ7W8gRfoPNYJvSwvezpY/exec?action=register_user";

  async function submitReg() {
    const nama = document.getElementById("nama").value.trim();
    const nim = document.getElementById("nim").value.trim();

    if (!nama) return show("Nama wajib diisi");
    if (!nim) return show("NIM wajib diisi");

    show("Menyimpan user...");

    try {
      const res = await fetch(GAS_REGISTER, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: nama, nim: nim })
      });

      const json = await res.json();

      if (!json.ok) {
        show("Gagal: " + json.error);
        return;
      }

      localStorage.setItem("presence_nama", json.data.nama);
      localStorage.setItem("presence_nim", json.data.nim);
      localStorage.setItem("presence_user_id", json.data.user_id);

      window.location.href = "./scanner.html";
    } catch (err) {
      show("Error: " + err);
    }
  }

  function show(msg) {
    document.getElementById("out").textContent = msg;
  }
</script>
</body>
</html>
