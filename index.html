<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrasi Presensi</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe2ea;
      --success-bg: #ecfdf5;
      --success-text: #065f46;
      --error-bg: #fef2f2;
      --error-text: #991b1b;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #dbeafe 0, transparent 30%),
        radial-gradient(circle at bottom right, #e0e7ff 0, transparent 25%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 430px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 22px;
      border: 1px solid rgba(219, 226, 234, 0.8);
    }

    .brand {
      width: 58px;
      height: 58px;
      border-radius: 14px;
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 18px;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #1e293b;
    }

    .input-wrap {
      position: relative;
    }

    input {
      width: 100%;
      height: 50px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 14px;
      font-size: 16px;
      outline: none;
      background: #fff;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    input::placeholder {
      color: #94a3b8;
    }

    .helper {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 10px 18px rgba(37, 99, 235, 0.2);
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      box-shadow: none;
    }

    .status {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .status.show {
      display: block;
    }

    .status.info {
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }

    .status.success {
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid #a7f3d0;
    }

    .status.error {
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid #fecaca;
    }

    .footer-note {
      margin-top: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px 18px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="brand">QR</div>

      <h1>Registrasi Presensi</h1>
      <p class="subtitle">
        Masukkan nama dan NIM terlebih dahulu sebelum melakukan scan QR untuk presensi.
      </p>

      <form id="regForm">
        <div class="form-group">
          <label for="nama">Nama Lengkap</label>
          <div class="input-wrap">
            <input
              type="text"
              id="nama"
              placeholder="Contoh: Sutantiyar Dwiputra"
              autocomplete="name"
              required
            />
          </div>
          <div class="helper">Gunakan nama sesuai data akademik.</div>
        </div>

        <div class="form-group">
          <label for="nim">NIM</label>
          <div class="input-wrap">
            <input
              type="text"
              id="nim"
              placeholder="Contoh: 434231073"
              inputmode="numeric"
              autocomplete="off"
              required
            />
          </div>
          <div class="helper">Masukkan NIM tanpa spasi.</div>
        </div>

        <button type="submit" class="btn" id="submitBtn">
          Lanjut ke Scan QR
        </button>
      </form>

      <div id="msg" class="status"></div>

      <div class="footer-note">
        Data Anda akan digunakan untuk pencatatan presensi pada sistem.
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxzfd50NgorFAr1bRa7MlH93w4-tTfhl--pSzr5XJiqe0Zg_ERW_zQ36s2jJJoLuH_-/exec";

    const form = document.getElementById("regForm");
    const namaInput = document.getElementById("nama");
    const nimInput = document.getElementById("nim");
    const msgBox = document.getElementById("msg");
    const submitBtn = document.getElementById("submitBtn");

    function showMessage(text, type = "info") {
      msgBox.textContent = text;
      msgBox.className = "status show " + type;
    }

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? "Memproses..." : "Lanjut ke Scan QR";
    }

    function sanitizeNim(value) {
      return value.replace(/\s+/g, "");
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      lanjutScan();
    });

    async function lanjutScan() {
      const nama = namaInput.value.trim();
      const nim = sanitizeNim(nimInput.value.trim());

      if (!nama) {
        showMessage("Nama wajib diisi.", "error");
        namaInput.focus();
        return;
      }

      if (!nim) {
        showMessage("NIM wajib diisi.", "error");
        nimInput.focus();
        return;
      }

      localStorage.setItem("presence_nama", nama);
      localStorage.setItem("presence_nim", nim);

      setLoading(true);
      showMessage("Menyimpan data pengguna...", "info");

      const url =
        GAS_URL +
        "?action=register_beacon" +
        "&name=" + encodeURIComponent(nama) +
        "&nim=" + encodeURIComponent(nim) +
        "&_ts=" + Date.now();

      const img = new Image();
      img.onload = redirectToScanner;
      img.onerror = redirectToScanner;
      img.src = url;
    }

    function redirectToScanner() {
      showMessage("Data berhasil dikirim. Mengalihkan ke halaman scan...", "success");
      setTimeout(() => {
        window.location.href = "./home.html";
      }, 700);
    }
  </script>
</body>
</html>
