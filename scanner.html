<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Scan QR Presensi</title>

<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body style="font-family:Arial;padding:16px;">

<h2>Scan QR Presensi</h2>

<div id="who"></div>

<button onclick="stop()">Stop Camera</button>
<!-- <button onclick="resetReg()">Ganti Nama/NIM</button> -->

<div id="reader" style="width:320px;margin-top:12px;"></div>

<pre id="out"></pre>

<script>

const GAS_EXEC = "https://script.google.com/macros/s/AKfycbwm3T5ueVAIdUQ5Sn47LtqSaFFLWmx6lct0xxh4JLC1bcBzZtS_3KFN_002KumzMXmO/exec";

const nama = localStorage.getItem("presence_nama") || "";
const nim  = localStorage.getItem("presence_nim") || "";

if(!nama || !nim){
  window.location.href = "./index.html";
}

document.getElementById("who").innerHTML =
nama+"<br>"+nim;

let scanner = null;
let sendingLock = false;

function log(msg){
  document.getElementById("out").textContent = msg;
}

function extractToken(text){

  if(text.startsWith("TKN-")) return text;

  try{
    const url = new URL(text);
    return url.searchParams.get("t");
  }catch(e){}

  const match = text.match(/TKN-[A-Z0-9]{6}/);
  return match ? match[0] : text;
}

async function start(){

  if(scanner) return;

  log("Starting camera...");

  scanner = new Html5Qrcode("reader");

  await scanner.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: 250
    },
    async (decodedText)=>{

      if(sendingLock) return;

      sendingLock = true;

      const token = extractToken(decodedText);

      log("Token: "+token+"\nSending...");

      try{

        await sendBeaconCheckin(token);

        log("✅ Presensi terkirim\nToken: "+token);

      }catch(err){

        log("❌ Gagal: "+err);

      }

      setTimeout(()=>sendingLock=false,2000);
    }
  );

}

async function stop(){

  if(!scanner) return;

  await scanner.stop();
  await scanner.clear();

  scanner = null;

}

function resetReg(){

  localStorage.removeItem("presence_nama");
  localStorage.removeItem("presence_nim");

  window.location.href = "./index.html";

}

async function sendBeaconCheckin(qr_token){

  const url =
  GAS_EXEC+
  "?action=checkin_beacon"+
  "&name="+encodeURIComponent(nama)+
  "&nim="+encodeURIComponent(nim)+
  "&t="+encodeURIComponent(qr_token)+
  "&_="+Date.now();

  await new Promise((resolve)=>{

    const img = new Image();

    img.onload = resolve;
    img.onerror = resolve;

    img.src = url;

  });

}

// ✅ AUTO START CAMERA
window.addEventListener("load", ()=>{
  start();
});

</script>
</body>
</html>
