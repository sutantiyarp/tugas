<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan QR Presensi</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe2ea;
      --success-bg: #ecfdf5;
      --success-text: #065f46;
      --error-bg: #fef2f2;
      --error-text: #991b1b;
      --info-bg: #eff6ff;
      --info-text: #1d4ed8;
      --warning-bg: #fffbeb;
      --warning-text: #92400e;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #dbeafe 0, transparent 30%),
        radial-gradient(circle at bottom right, #e0e7ff 0, transparent 25%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 20px;
      border: 1px solid rgba(219, 226, 234, 0.8);
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .brand {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
      flex-shrink: 0;
    }

    .title-wrap h1 {
      margin: 0 0 6px;
      font-size: 26px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .user-box {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 18px;
    }

    .user-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
    }

    .user-label {
      color: var(--muted);
    }

    .user-value {
      font-weight: bold;
      color: var(--text);
      text-align: right;
      word-break: break-word;
    }

    .scanner-box {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      background: #0f172a;
      min-height: 320px;
      border: 1px solid #cbd5e1;
      margin-bottom: 18px;
    }

    #reader {
      width: 100%;
      min-height: 320px;
      background: #0f172a;
    }

    .scanner-overlay {
      pointer-events: none;
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scan-frame {
      width: 220px;
      height: 220px;
      border: 3px solid rgba(255, 255, 255, 0.95);
      border-radius: 18px;
      box-shadow: 0 0 0 9999px rgba(15, 23, 42, 0.35);
      position: relative;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .scan-frame::before,
    .scan-frame::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      height: 2px;
      background: rgba(255, 255, 255, 0.9);
      transition: background 0.2s ease;
    }

    .scan-frame::before {
      top: 24px;
    }

    .scan-frame::after {
      bottom: 24px;
    }

    .scan-frame.detected {
      border-color: #22c55e;
      box-shadow:
        0 0 0 4px rgba(34, 197, 94, 0.22),
        0 0 0 9999px rgba(15, 23, 42, 0.22);
      transform: scale(1.02);
    }

    .scan-frame.detected::before,
    .scan-frame.detected::after {
      background: #22c55e;
    }

    .scan-frame.sending {
      border-color: #f59e0b;
      box-shadow:
        0 0 0 4px rgba(245, 158, 11, 0.22),
        0 0 0 9999px rgba(15, 23, 42, 0.22);
    }

    .scan-frame.sending::before,
    .scan-frame.sending::after {
      background: #f59e0b;
    }

    .hint {
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .btn {
      height: 48px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 10px 18px rgba(37, 99, 235, 0.2);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .btn-secondary:hover {
      background: #cbd5e1;
    }

    .status {
      display: none;
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-line;
    }

    .status.show {
      display: block;
    }

    .status.info {
      background: var(--info-bg);
      color: var(--info-text);
      border: 1px solid #bfdbfe;
    }

    .status.success {
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid #a7f3d0;
    }

    .status.error {
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid #fecaca;
    }

    .status.warning {
      background: var(--warning-bg);
      color: var(--warning-text);
      border: 1px solid #fde68a;
    }

    .footer-note {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .title-wrap h1 {
        font-size: 22px;
      }

      .scan-frame {
        width: 200px;
        height: 200px;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }

    #reader__scan_region {
      background: transparent !important;
    }

    #reader video {
      border-radius: 0 !important;
    }

    #reader img {
      display: none !important;
    }

    #reader__dashboard {
      padding: 10px !important;
      background: #fff !important;
    }

    #reader__dashboard_section_swaplink {
      color: var(--primary) !important;
      text-decoration: none !important;
      font-weight: bold !important;
    }

    #reader button,
    #reader select {
      border-radius: 10px !important;
      border: 1px solid var(--border) !important;
      padding: 8px 10px !important;
      font-size: 14px !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="topbar">
        <div class="brand">📷</div>
        <div class="title-wrap">
          <h1>Scan QR Presensi</h1>
          <p class="subtitle">Arahkan kamera ke QR Code yang diberikan untuk melakukan presensi.</p>
        </div>
      </div>

      <div class="user-box">
        <div class="user-item">
          <div class="user-label">Nama</div>
          <div class="user-value" id="userNama">-</div>
        </div>
        <div class="user-item">
          <div class="user-label">NIM</div>
          <div class="user-value" id="userNim">-</div>
        </div>
      </div>

      <div class="scanner-box">
        <div id="reader"></div>
        <div class="scanner-overlay">
          <div class="scan-frame"></div>
        </div>
      </div>

      <div class="hint">
        Pastikan QR Code berada di dalam kotak scan dan terlihat jelas oleh kamera.
      </div>

      <div id="msg" class="status"></div>

      <div class="actions">
        <button class="btn btn-secondary" onclick="kembali()">Kembali</button>
        <button class="btn btn-primary" onclick="scanUlang()">Scan Ulang</button>
      </div>

      <div class="footer-note">
        Jika kamera belum muncul, izinkan akses kamera pada browser Anda.
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    const GAS_EXEC = "https://script.google.com/macros/s/AKfycbzwEOB4ji8PBSv7tIX4xz1Dhbn6xK93P-fY2Hw6QusCcN3QgA51HOuRx9umvuXQFl42/exec";

    const nama = localStorage.getItem("presence_nama") || "";
    const nim = localStorage.getItem("presence_nim") || "";

    const msgBox = document.getElementById("msg");
    const userNama = document.getElementById("userNama");
    const userNim = document.getElementById("userNim");
    const scanFrame = document.querySelector(".scan-frame");

    let html5QrCode = null;
    let isSending = false;
    let lastScannedToken = "";
    let scanCooldown = false;
    let scanLocked = false;

    userNama.textContent = nama || "-";
    userNim.textContent = nim || "-";

    function showMessage(text, type = "info") {
      msgBox.textContent = text;
      msgBox.className = "status show " + type;
    }

    function setFrameState(state = "normal") {
      scanFrame.classList.remove("detected", "sending");

      if (state === "detected") {
        scanFrame.classList.add("detected");
      } else if (state === "sending") {
        scanFrame.classList.add("sending");
      }
    }

    function resetFrameSoon(delay = 1200) {
      setTimeout(() => {
        setFrameState("normal");
      }, delay);
    }

    function kembali() {
      window.location.href = "./index.html";
    }

    async function stopScanner() {
      if (html5QrCode && html5QrCode.isScanning) {
        try {
          await html5QrCode.stop();
        } catch (e) {}
      }
    }

    async function mulaiScanner() {
      if (!nama || !nim) {
        showMessage("Data pengguna tidak ditemukan. Silakan kembali ke halaman registrasi.", "error");
        return;
      }

      try {
        html5QrCode = new Html5Qrcode("reader");

        await html5QrCode.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: { width: 220, height: 220 }
          },
          onScanSuccess,
          onScanFailure
        );

        setFrameState("normal");
        showMessage("Scanner aktif. Silakan arahkan kamera ke QR Code.", "info");
      } catch (err) {
        console.error(err);
        showMessage("Kamera gagal diakses. Pastikan izin kamera sudah diberikan.", "error");
      }
    }

    function onScanFailure() {
      // sengaja kosong agar tidak spam pesan
    }

    async function onScanSuccess(decodedText) {
      const token = (decodedText || "").trim();

      if (!token) return;
      if (isSending) return;
      if (scanCooldown) return;
      if (token === lastScannedToken) return;

      isSending = true;
      scanCooldown = true;
      lastScannedToken = token;

      setFrameState("detected");
      showMessage("QR valid terdeteksi. Mengirim data presensi...", "success");

      sendBeaconCheckin(token);

      setTimeout(() => {
        scanCooldown = false;
        lastScannedToken = "";
      }, 2500);
    }

    async function sendBeaconCheckin(token) {
      if (isSending || scanLocked) return;

      isSending = true;
      setFrameState("sending");

      const url =
        GAS_EXEC +
        "?action=checkin_beacon" +
        "&name=" + encodeURIComponent(nama) +
        "&nim=" + encodeURIComponent(nim) +
        "&t=" + encodeURIComponent(token) +
        "&ts_client=" + encodeURIComponent(new Date().toISOString()) +
        "&_ts=" + Date.now();

      try {
        const res = await jsonpRequest(url);

        if (res && res.ok) {
          scanLocked = true; // stop scan otomatis
          setFrameState("detected");
          showMessage("Presensi berhasil dikirim.", "success");
          return;
        }

        const msg = res && res.error ? res.error : "Unknown error";

        // kalau user sudah presensi di sesi ini, lock juga
        if (msg.toLowerCase().includes("sudah presensi")) {
          scanLocked = true;
          setFrameState("detected");
          showMessage("Presensi sudah pernah dilakukan untuk sesi ini.", "success");
          return;
        }

        setFrameState("normal");
        showMessage("Presensi gagal: " + msg, "error");

      } catch (err) {
        setFrameState("normal");
        showMessage("Gagal menghubungi server: " + err.message, "error");
      } finally {
        isSending = false;
      }
    }

    function scanUlang() {
      scanLocked = false;
      isSending = false;
      setFrameState("normal");
      showMessage("Silakan scan QR lagi.", "info");
    }

    function jsonpRequest(url) {
      return new Promise((resolve, reject) => {
        const cbName = "jsonp_cb_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
        const script = document.createElement("script");
        const sep = url.includes("?") ? "&" : "?";

        window[cbName] = function (data) {
          cleanup();
          resolve(data);
        };

        function cleanup() {
          delete window[cbName];
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        script.src = url + sep + "callback=" + cbName;
        script.onerror = function () {
          cleanup();
          reject(new Error("Gagal menghubungi server"));
        };

        document.body.appendChild(script);
      });
    }

    async function mulaiUlangScanner() {
      showMessage("Menyiapkan scanner...", "info");
      isSending = false;
      lastScannedToken = "";
      scanCooldown = false;
      setFrameState("normal");

      try {
        await stopScanner();
      } catch (e) {}

      const reader = document.getElementById("reader");
      reader.innerHTML = "";

      await mulaiScanner();
    }

    mulaiScanner();
  </script>
</body>
</html>
